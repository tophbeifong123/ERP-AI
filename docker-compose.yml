services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.123.59
    container_name: n8n_local
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${TZ}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_HOST=${N8N_HOST}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - EXECUTIONS_DATA_PRUNE=${EXECUTIONS_DATA_PRUNE}
      - EXECUTIONS_DATA_MAX_AGE=${EXECUTIONS_DATA_MAX_AGE}
      - EXECUTIONS_DATA_PRUNE_TIMEOUT=${EXECUTIONS_DATA_PRUNE_TIMEOUT}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_DEFAULT_BINARY_DATA_MODE=${N8N_DEFAULT_BINARY_DATA_MODE:-filesystem}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_LOCATION=${GCP_LOCATION}
      - GCP_VEO_OUTPUT_BUCKET=${GCP_VEO_OUTPUT_BUCKET}
      # Shared with the NestJS backend so the media callback from n8n is accepted
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev-internal-api-key}
      - GOOGLE_APPLICATION_CREDENTIALS=/home/node/.n8n/gcp-key.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./gcp-key.json:/home/node/.n8n/gcp-key.json:ro
      
  postgres:
    image: postgres:15-alpine
    container_name: erp-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: erp-ai-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: erp-ai-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: erp-ai-services
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ERP-AI Services
      DEBUG: "True"
      HOST: 0.0.0.0
      PORT: 8000
      BACKEND_BASE_URL: http://host.docker.internal:3000
      INTERNAL_TOKEN: dev-internal-api-key
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  redis_data:
  minio_data:
